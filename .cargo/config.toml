[build]
target = "riscv32imc-esp-espidf"

[target.riscv32imc-esp-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor --chip esp32c3"
rustflags = ["--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32c3"
ESP_IDF_VERSION = "v5.5.3"
ESP_IDF_TOOLS_INSTALL_DIR = "global"
# Do not set IDF_PATH here — use managed ESP-IDF v5.5.x (esp-homekit-sdk is incompatible with IDF 6.x).
HOMEKIT_PATH = { value = "third-party/esp-homekit-sdk", relative = true }
